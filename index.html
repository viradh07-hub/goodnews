            color: #a0a5aa; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-btn:hover {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);

        }
        .filter-btn.active {

        }

            font-weight: 600;
